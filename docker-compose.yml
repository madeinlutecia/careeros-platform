services:
  postgres:
    image: postgres:16-alpine
    container_name: careeros-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-careeros}
      POSTGRES_USER: ${POSTGRES_USER:-careeros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careeros_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careeros}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careeros-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-careeros}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-careeros}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-careeros_dev}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PYTHON_SERVICE_URL: http://python-service:8000
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: careeros-python
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      BACKEND_URL: http://backend:8080
    ports:
      - "${PYTHON_SERVICE_PORT:-8000}:8000"
    volumes:
      - ./python-service/app:/app/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careeros-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    environment:
      API_URL: ${API_URL:-http://localhost:8080/api/v1}

  # Optional: enable when messaging is needed
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.6.0
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #
  # kafka:
  #   image: confluentinc/cp-kafka:7.6.0
  #   depends_on:
  #     - zookeeper
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
  #     KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
  #     KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: careeros-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    profiles: ["observability"]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: careeros-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    profiles: ["observability"]

volumes:
  postgres_data:
  grafana_data:

networks:
  default:
    name: careeros-network
