spring:
  application:
    name: careeros-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/careeros}
    username: ${SPRING_DATASOURCE_USERNAME:careeros}
    password: ${SPRING_DATASOURCE_PASSWORD:careeros_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${BACKEND_PORT:8080}

careeros:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-production-use-at-least-256-bits-secret-key}
  ai:
    python-service-url: ${PYTHON_SERVICE_URL:http://localhost:8000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

logging:
  level:
    com.careeros: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
