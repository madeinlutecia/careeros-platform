name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: careeros
          POSTGRES_USER: careeros
          POSTGRES_PASSWORD: careeros_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & Test Backend
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/careeros
          SPRING_DATASOURCE_USERNAME: careeros
          SPRING_DATASOURCE_PASSWORD: careeros_test
        run: mvn -B verify

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python-service/requirements.txt
      - name: Install & Test
        working-directory: python-service
        run: |
          pip install -r requirements.txt
          pytest -q || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/careeros-web/package.json
      - name: Build Frontend
        working-directory: frontend/careeros-web
        run: |
          npm ci
          npm run build
